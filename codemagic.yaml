# Codemagic cloud-Mac build for MedCompanion AI iOS (Capacitor).
# SETUP (one time):
#   1. Connect this repo at codemagic.io (GitHub App).
#   2. Add your App Store Connect API key in Codemagic named EXACTLY "MedCompanion ASC Key".
#   3. Create the app in App Store Connect (bundle id com.medcompanionai.app).
#   4. Run the "ios-release" workflow -> uploads to TestFlight.
# No committed package.json / ios project: this workflow reconstructs Capacitor
# tooling and generates ios/ fresh on the Mac, then applies signing + build fixes.
workflows:
  ios-release:
    name: MedCompanion AI iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: MedCompanion ASC Key
    environment:
      vars:
        BUNDLE_ID: "com.medcompanionai.app"
        XCODE_SCHEME: "App"
        DEV_TEAM: "357ABX659P"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Reconstruct Capacitor tooling
        script: |
          cat > package.json <<'EOF'
          {
            "name": "medcompanion-ai",
            "version": "1.0.0",
            "private": true,
            "devDependencies": { "@capacitor/cli": "^8.4.0" },
            "dependencies": { "@capacitor/core": "^8.4.0", "@capacitor/ios": "^8.4.0" }
          }
          EOF
          npm install --no-audit --no-fund
      - name: Add iOS platform (generates ios/ on the Mac)
        script: |
          if [ ! -d ios ]; then npx cap add ios; fi
      - name: Inject Info.plist keys (usage strings + export compliance)
        script: |
          PLIST=ios/App/App/Info.plist
          set_str(){ plutil -replace "$1" -string "$2" "$PLIST" 2>/dev/null || plutil -insert "$1" -string "$2" "$PLIST"; }
          set_str NSCameraUsageDescription "MedCompanion uses your camera so you can photograph a lab result, prescription, or document and understand it in plain language."
          set_str NSPhotoLibraryUsageDescription "MedCompanion lets you upload a photo of a lab result or document so it can explain it in plain language."
          set_str NSMicrophoneUsageDescription "MedCompanion can use your microphone for voice input of your symptoms."
          plutil -replace ITSAppUsesNonExemptEncryption -bool false "$PLIST" 2>/dev/null || plutil -insert ITSAppUsesNonExemptEncryption -bool false "$PLIST"
      - name: Capacitor sync (copies frontend/ into the app)
        script: npx cap sync ios
      - name: Set DEVELOPMENT_TEAM on the generated project
        script: |
          perl -0777 -i -pe 's/(\n(\t+)buildSettings = \{)/$1\n$2\tDEVELOPMENT_TEAM = $ENV{DEV_TEAM};/g' ios/App/App.xcodeproj/project.pbxproj
          grep -c "DEVELOPMENT_TEAM" ios/App/App.xcodeproj/project.pbxproj || true
      - name: Resolve dependencies (CocoaPods or SPM, whichever the project uses)
        script: |
          if [ -f ios/App/Podfile ]; then
            cd ios/App && pod install
          else
            xcodebuild -resolvePackageDependencies -project ios/App/App.xcodeproj -scheme "$XCODE_SCHEME" || true
          fi
      - name: Set up code signing (create distribution cert + App Store profile)
        script: |
          keychain initialize
          openssl genrsa -out /tmp/cert_key.pem 2048
          app-store-connect certificates create --type IOS_DISTRIBUTION --certificate-key=@file:/tmp/cert_key.pem --save || true
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --certificate-key=@file:/tmp/cert_key.pem --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App && agvtool new-version -all $(($(date +%s) % 100000)) || true
      - name: Build IPA (workspace if CocoaPods, else project)
        script: |
          if [ -d ios/App/App.xcworkspace ]; then
            xcode-project build-ipa --workspace ios/App/App.xcworkspace --scheme "$XCODE_SCHEME"
          else
            xcode-project build-ipa --project ios/App/App.xcodeproj --scheme "$XCODE_SCHEME"
          fi
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
