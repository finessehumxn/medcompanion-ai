# Codemagic cloud-Mac build for MedCompanion AI iOS (Capacitor).
# SETUP (one time):
#   1. Connect this repo at codemagic.io (GitHub App).
#   2. Add your App Store Connect API key in Codemagic named EXACTLY "MedCompanion ASC Key".
#   3. Create the app in App Store Connect (bundle id com.medcompanionai.app).
#   4. Run the "ios-release" workflow -> uploads to TestFlight.
# No committed package.json / ios project: this workflow reconstructs Capacitor
# tooling and generates ios/ fresh on the Mac, then applies signing + build fixes.
workflows:
  ios-release:
    name: MedCompanion AI iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: BarterThat ASC Key
    environment:
      vars:
        BUNDLE_ID: "com.medcompanionai.app"
        XCODE_SCHEME: "App"
        DEV_TEAM: "357ABX659P"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Reconstruct Capacitor tooling
        script: |
          cat > package.json <<'EOF'
          {
            "name": "medcompanion-ai",
            "version": "1.0.0",
            "private": true,
            "devDependencies": { "@capacitor/cli": "^8.4.0" },
            "dependencies": { "@capacitor/core": "^8.4.0", "@capacitor/ios": "^8.4.0" }
          }
          EOF
          npm install --no-audit --no-fund
      - name: Add iOS platform (generates ios/ on the Mac)
        script: |
          if [ ! -d ios ]; then npx cap add ios; fi
      - name: Inject Info.plist keys (usage strings + export compliance)
        script: |
          PLIST=ios/App/App/Info.plist
          set_str(){ plutil -replace "$1" -string "$2" "$PLIST" 2>/dev/null || plutil -insert "$1" -string "$2" "$PLIST"; }
          set_str NSCameraUsageDescription "MedCompanion uses your camera so you can photograph a lab result, prescription, or document and understand it in plain language."
          set_str NSPhotoLibraryUsageDescription "MedCompanion lets you upload a photo of a lab result or document so it can explain it in plain language."
          set_str NSMicrophoneUsageDescription "MedCompanion can use your microphone for voice input of your symptoms."
          plutil -replace ITSAppUsesNonExemptEncryption -bool false "$PLIST" 2>/dev/null || plutil -insert ITSAppUsesNonExemptEncryption -bool false "$PLIST"
      - name: Capacitor sync (copies frontend/ into the app)
        script: npx cap sync ios
      - name: Set the MedCompanion app icon (all sizes, consistent)
        script: |
          # Real 1024x1024 no-alpha source at assets/icon.png. Generate the FULL iOS icon
          # set from it so every size matches (Apple 2.3.8: icons must be final + consistent).
          # No "|| true" — if icon generation fails we want the build to fail, not ship a
          # placeholder. No per-size copy hack (that left sizes inconsistent).
          npx --yes @capacitor/assets generate --ios --assetPath assets \
            --iconBackgroundColor '#034730' --iconBackgroundColorDark '#034730'
          echo "Generated AppIcon set:"; ls -la ios/App/App/Assets.xcassets/AppIcon.appiconset/ | head -20
      - name: Set DEVELOPMENT_TEAM on the generated project
        script: |
          perl -0777 -i -pe 's/(\n(\t+)buildSettings = \{)/$1\n$2\tDEVELOPMENT_TEAM = $ENV{DEV_TEAM};/g' ios/App/App.xcodeproj/project.pbxproj
          grep -c "DEVELOPMENT_TEAM" ios/App/App.xcodeproj/project.pbxproj || true
      - name: Resolve dependencies (CocoaPods or SPM, whichever the project uses)
        script: |
          if [ -f ios/App/Podfile ]; then
            cd ios/App && pod install
          else
            xcodebuild -resolvePackageDependencies -project ios/App/App.xcodeproj -scheme "$XCODE_SCHEME" || true
          fi
      - name: Set up code signing (revoke stale certs, then one clean cert + profile)
        script: |
          keychain initialize
          # Apple caps you at ~2 Distribution certificates per team. Minting a new one
          # every build hits that cap, after which no usable cert/profile is produced
          # and the archive fails with "requires a provisioning profile" (exit 65).
          # Fix: revoke existing Distribution certs first, then create exactly ONE fresh
          # cert + profile. Revoking is safe for App Store builds — Apple re-signs
          # accepted uploads, so already-shipped/processed builds are unaffected.
          for CID in $(app-store-connect certificates list --type IOS_DISTRIBUTION --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); items=d if isinstance(d,list) else d.get('data',[]); print('\n'.join(str(c.get('id','')) for c in items))" 2>/dev/null); do
            [ -n "$CID" ] && app-store-connect certificates delete "$CID" --ignore-not-found || true
          done
          openssl genrsa -out /tmp/cert_key.pem 2048
          app-store-connect certificates create --type IOS_DISTRIBUTION --certificate-key=@file:/tmp/cert_key.pem --save
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --certificate-key=@file:/tmp/cert_key.pem --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          # Full unix timestamp = always increases (the old % 100000 could wrap lower).
          cd ios/App && agvtool new-version -all $(date +%s) || true
      - name: Build IPA (workspace if CocoaPods, else project)
        script: |
          if [ -d ios/App/App.xcworkspace ]; then
            xcode-project build-ipa --workspace ios/App/App.xcworkspace --scheme "$XCODE_SCHEME"
          else
            xcode-project build-ipa --project ios/App/App.xcodeproj --scheme "$XCODE_SCHEME"
          fi
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Upload to App Store Connect for App Review, but DON'T auto-submit to
        # TestFlight external beta (that needs a one-time Beta test-info form and
        # was showing "post-processing failed" on every otherwise-successful build).
        submit_to_testflight: false

  # ── GOOGLE PLAY (Android) ─────────────────────────────────────────────────────
  # SETUP (one time) — full steps in the chat:
  #   1. Google Play Developer account; create the app (com.medcompanionai.app).
  #   2. Generate an upload keystore; add these to a Codemagic env group named
  #      "google_play" (mark all Secure):
  #        CM_KEYSTORE (base64 of the .jks), CM_KEYSTORE_PASSWORD,
  #        CM_KEY_ALIAS, CM_KEY_PASSWORD,
  #        GCLOUD_SERVICE_ACCOUNT_CREDENTIALS (the Play service-account JSON).
  #   3. Run "android-release" -> builds a signed .aab and uploads to the internal track.
  # Mirrors the iOS job: reconstructs Capacitor tooling, then builds the committed android/.
  android-release:
    name: MedCompanion AI Android Release
    # Build Android on the Mac instance too — the free plan only includes mac_mini_m2
    # (linux_x2 requires a paid plan). macOS machines have the Android SDK + JDK.
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.medcompanionai.app"
      node: 22
    scripts:
      - name: Reconstruct Capacitor tooling
        script: |
          cat > package.json <<'EOF'
          {
            "name": "medcompanion-ai",
            "version": "1.0.0",
            "private": true,
            "devDependencies": { "@capacitor/cli": "^8.4.0" },
            "dependencies": { "@capacitor/core": "^8.4.0", "@capacitor/android": "^8.4.0" }
          }
          EOF
          npm install --no-audit --no-fund
      - name: Capacitor sync (copies frontend/ into the Android app)
        script: npx cap sync android
      - name: Set the MedCompanion app icon
        script: |
          npx --yes @capacitor/assets generate --android \
            --iconBackgroundColor '#034730' --iconBackgroundColorDark '#034730' || true
      - name: Set up Android signing (from Codemagic secrets)
        script: |
          echo "$CM_KEYSTORE" | openssl base64 -d -A > "$CM_BUILD_DIR/upload-keystore.jks"
          cat > android/keystore.properties <<EOF
          storeFile=$CM_BUILD_DIR/upload-keystore.jks
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF
      - name: Bump versionCode (monotonic)
        script: |
          cd android
          sed -i.bak "s/versionCode .*/versionCode $(date +%s)/" app/build.gradle && rm -f app/build.gradle.bak
      - name: Build signed AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
