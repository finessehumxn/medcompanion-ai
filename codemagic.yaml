# Codemagic cloud-Mac build for MedCompanion AI iOS (Capacitor).
# SETUP (one time):
#   1. Connect this repo at codemagic.io (GitHub App).
#   2. Create an App Store Connect API key (App Store Connect > Users and Access >
#      Integrations > App Store Connect API), then add it in Codemagic named EXACTLY
#      "MedCompanion ASC Key".
#   3. Create the app in App Store Connect (bundle id com.medcompanionai.app) first.
#   4. Run the "ios-release" workflow. The build uploads to TestFlight; promote to the
#      App Store from App Store Connect when ready.
# Note: there is no committed package.json (matches the Android build) — this workflow
# reconstructs Capacitor tooling and generates the ios/ project fresh on the Mac.
workflows:
  ios-release:
    name: MedCompanion AI iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: MedCompanion ASC Key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.medcompanionai.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.medcompanionai.app"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Reconstruct Capacitor tooling (no committed package.json)
        script: |
          cat > package.json <<'EOF'
          {
            "name": "medcompanion-ai",
            "version": "1.1.6",
            "private": true,
            "devDependencies": { "@capacitor/cli": "^8.4.0" },
            "dependencies": {
              "@capacitor/core": "^8.4.0",
              "@capacitor/ios": "^8.4.0"
            }
          }
          EOF
          npm install
      - name: Add iOS platform (generates ios/ on the Mac)
        script: |
          if [ ! -d ios ]; then npx cap add ios; fi
      - name: Inject iOS usage descriptions (camera / photo / mic)
        script: |
          PLIST=ios/App/App/Info.plist
          set_plist() {
            plutil -replace "$1" -string "$2" "$PLIST" 2>/dev/null || plutil -insert "$1" -string "$2" "$PLIST"
          }
          set_plist NSCameraUsageDescription "MedCompanion uses your camera so you can photograph a lab result, prescription, or document and understand it in plain language."
          set_plist NSPhotoLibraryUsageDescription "MedCompanion lets you upload a photo of a lab result or document so it can explain it in plain language."
          set_plist NSMicrophoneUsageDescription "MedCompanion can use your microphone for voice input of your symptoms."
      - name: Capacitor sync (iOS)
        script: npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up provisioning profiles
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(date +%s) % 100000)) || true
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
